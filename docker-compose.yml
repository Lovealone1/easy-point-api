services:

  # ── NestJS API (dev – hot reload) ─────────────────────────────────────────
  easy-point-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-point-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Override Redis host: dentro de Docker usa el nombre del servicio
      - REDIS_HOST=social-redis
    volumes:
      # Hot-reload: monta src en vivo; node_modules queda aislado en el contenedor
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./generated:/app/generated
      - /app/node_modules
    depends_on:
      - social-redis
    networks:
      - easy-point-net

  # ── Redis cache ────────────────────────────────────────────────────────────
  social-redis:
    image: redis:7-alpine
    container_name: social-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --logLevel warning
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - easy-point-net

  # ── Redis Commander – Web UI ───────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    hostname: redis-commander
    environment:
      - REDIS_HOSTS=local:social-redis:6379:0:${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - social-redis
    networks:
      - easy-point-net

networks:
  easy-point-net:
    driver: bridge

volumes:
  redis_data:
